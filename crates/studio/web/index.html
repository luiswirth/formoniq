<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>formoniq studio</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0b0b0e;
        color: #d8d8e0;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      /* The winit-created canvas is appended to <body> by the wasm module. */
      canvas {
        outline: none;
        touch-action: none;
      }
      #message {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
        line-height: 1.6;
      }
      #message a {
        color: #8ab4f8;
      }
      #message.hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="message">loading formoniq studio…</div>

    <script type="module">
      const message = document.getElementById("message");

      // The glue and the wasm are only valid as a *pair*: the wasm imports
      // exactly the functions that bindgen run emitted. Their filenames are
      // constant across every deploy, so a browser is free to serve one from
      // cache and fetch the other -- and a mismatched pair fails at
      // instantiation with an unhelpful "import must be callable".
      //
      // Stamping both URLs with the build makes each deploy's modules distinct,
      // so they are cached and evicted together. The deploy substitutes the
      // commit; a local build leaves the placeholder, where one stamp for every
      // build is no worse than the none it had before.
      const BUILD = "__BUILD_STAMP__";
      // The worker loads the same glue and must be stamped with it, and its URL
      // is built in Rust -- so the stamp is left where that code can read it.
      globalThis.__FORMONIQ_BUILD__ = BUILD;

      // WebGPU only, by choice: the viewer targets the modern backend and does
      // not carry a WebGL2 fallback. Fail early and legibly where it is absent.
      if (!("gpu" in navigator)) {
        message.innerHTML =
          "This viewer needs <strong>WebGPU</strong>, which this browser does not expose.<br />" +
          "Try a recent Chrome, Edge, or a browser with WebGPU enabled.";
      } else {
        try {
          const wasm = await import(`./formoniq_studio.js?v=${BUILD}`);
          // Passed explicitly: the glue resolves the wasm against its own
          // `import.meta.url`, which drops the query and would leave the wasm
          // free to come from cache while the glue did not.
          await wasm.default({
            module_or_path: `./formoniq_studio_bg.wasm?v=${BUILD}`,
          });
          message.classList.add("hidden");
          wasm.start();
        } catch (err) {
          console.error(err);
          message.innerHTML =
            "Failed to start.<br /><small>" + String(err) + "</small>";
        }
      }
    </script>
  </body>
</html>
