name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least privilege: CI only reads the repository.
permissions:
  contents: read

# A new push to a branch supersedes the run already in flight for it.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Fail the build on any warning, in CI only -- local builds stay warning-tolerant.
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  # The core jobs run on the workspace's default members -- every crate but
  # `studio`. Bare cargo commands (no `--workspace`) act on that set, so a core
  # PR is never gated on the wgpu/winit/egui stack. `studio` gets its own job.
  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets
      - run: cargo clippy --all-targets --all-features

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test
      - run: cargo test --all-features

  doc:
    name: doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The doc comments carry the mathematics: broken intra-doc links are errors.
      - run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  # `studio` and everything it pulls in, isolated so the graphics stack compiles
  # off the core's critical path. Same four checks, scoped to the one package.
  studio:
    name: studio
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -p formoniq-studio --all-targets --all-features
      - run: cargo test -p formoniq-studio --all-features
      - run: cargo doc -p formoniq-studio --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
      # The web target: guards against a wasm-only regression in the viewer's
      # platform split. The workflow's `RUSTFLAGS: -D warnings` overrides
      # `.cargo/config.toml`, so the `getrandom` web backend cfg is restated
      # here alongside it.
      - run: cargo clippy -p formoniq-studio --lib --target wasm32-unknown-unknown
        env:
          RUSTFLAGS: -D warnings --cfg getrandom_backend="wasm_js"
